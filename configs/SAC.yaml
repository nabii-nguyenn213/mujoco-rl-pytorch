env:
  name: Swimmer-v5
  max_episode_steps: 0
  reward_scaler: 1.0
  kwargs: {}
    
train:
  run_name: SAC_${env.name}
  total_timesteps: 500000
  memory_size: 100000
  batch_size: 256
  optimizer:
    name: Adam
    actor_lr: 0.0003
    critic_lr: 0.0003
    alpha_lr : 0.0003    # only if auto_alpha == true
  learning_start: 10000
  tau: 0.005
  gamma: 0.99
  auto_alpha: true 
  target_entropy: auto
  alpha: 0.2            # only if auto_alpha == false

  show_tb: true
  device: auto
  hidden_size_actor: [256, 256]
  hidden_size_critic: [256, 256]
  seed: 42
  gradient_step: 1

eval:
  eval_every: 5000
  save_every: 5000
  log_every: 500
  eval_episodes: 10

dir:
  root: .
  log: ${dir.root}/logs/log/${env.name}
  ckpt: ${dir.root}/results/checkpoints/${env.name}
  model: ${dir.root}/results/models/${env.name}
  best: ${dir.root}/results/best/${env.name}
  tensorboard: ${dir.root}/logs/tensorboard_logs/${env.name}
