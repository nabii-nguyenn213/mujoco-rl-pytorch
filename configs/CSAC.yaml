env:
  name: Reacher-v5
  max_episode_steps: 0
  reward_scaler: 1.0
  kwargs: {}
    
train:
  run_name: CSAC_${env.name}
  total_timesteps: 100000
  memory_size: 100000
  batch_size: 128
  optimizer:
    name: Adam
    actor_lr: 0.0003
    critic_lr: 0.0003
  learning_start: 1000
  tau: 0.005
  gamma: 0.99
  sigma: 0.2 
  tau_rel: 0.5
  alpha: 0.2

  show_tb: true
  device: auto
  hidden_size_actor: [64, 64]
  hidden_size_critic: [128, 128]
  seed: 44
  gradient_step: 2

eval:
  eval_every: 5000
  save_every: 5000
  log_every: 500
  eval_episodes: 10

dir:
  root: .
  log: ${dir.root}/logs/log/${env.name}
  ckpt: ${dir.root}/results/checkpoints/${env.name}
  model: ${dir.root}/results/models/${env.name}
  best: ${dir.root}/results/best/${env.name}
  tensorboard: ${dir.root}/logs/tensorboard_logs/${env.name}
